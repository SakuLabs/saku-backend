name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saku_test?schema=public

jobs:
  quality:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saku_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Prisma migrate deploy
        run: bunx prisma migrate deploy

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.build.json

      - name: Build
        run: bun run build

      - name: Test with coverage
        run: bun run test:cov -- --passWithNoTests

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    name: Integration + E2E (Testcontainers)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run integration tests
        run: bun run test:integration

      - name: Run e2e tests
        run: bun run test:e2e

  docker:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; the repo owner may contain caps.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (Dokploy)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Dokploy redeploy
        run: |
          curl -fSs --retry 3 --retry-delay 5 \
            -X POST "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}"

      # Verify the new release is live + DB reachable.
      # Skipped automatically until PROD_HEALTH_URL secret is set.
      - name: Verify live (readiness)
        if: ${{ secrets.PROD_HEALTH_URL != '' }}
        run: |
          url="${{ secrets.PROD_HEALTH_URL }}/health/ready"
          echo "Polling $url"
          for i in $(seq 1 30); do
            if curl -fsS "$url"; then
              echo "✅ healthy"; exit 0
            fi
            echo "attempt $i not ready; retrying in 10s"; sleep 10
          done
          echo "❌ deploy did not become healthy in time"; exit 1
